server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-components: always

debezium:
  # ── Ring buffer tuning ──────────────────────────────────────
  ring:
    buffer-size: ${DEBEZIUM_RING_BUFFER_SIZE:8192}
    drain-max-size: ${DEBEZIUM_RING_DRAIN_MAX_SIZE:256}
    drain-timeout-ms: ${DEBEZIUM_RING_DRAIN_TIMEOUT_MS:200}
    stall-timeout-ms: ${DEBEZIUM_RING_STALL_TIMEOUT_MS:25000}
    consecutive-fail-threshold: ${DEBEZIUM_RING_CONSECUTIVE_FAIL_THRESHOLD:3}
  # ── Namespace ───────────────────────────────────────────────
  # Unique namespace for multi-tenant Redis HA deployments.
  # Change this per deployment to isolate lock / offset / schema keys.
  namespace: ${DEBEZIUM_NAMESPACE:default}
  ha:
    lock-key: debezium:leader:mysql-dbz-connector
  sink:
    datasource:
      jdbc-url: ${SINK_DB_URL:jdbc:mysql://127.0.0.1:3306/mytest2_sink?useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true}
      username: ${SINK_DB_USER:root}
      password: ${SINK_DB_PASSWORD:root}
  config-properties: |
    name=mysql-dbz-connector
    connector.class=io.debezium.connector.mysql.MySqlConnector

    # Redis offset & schema history (HA)
    offset.storage=io.debezium.storage.redis.offset.RedisOffsetBackingStore
    offset.storage.redis.address=${REDIS_HOST:localhost}:${REDIS_PORT:6379}
    offset.storage.redis.password=${REDIS_PASSWORD:}
    offset.storage.redis.key=debezium:offsets:${debezium.namespace:default}
    offset.flush.interval.ms=10000

    schema.history.internal=io.debezium.storage.redis.history.RedisSchemaHistory
    schema.history.internal.redis.address=${REDIS_HOST:localhost}:${REDIS_PORT:6379}
    schema.history.internal.redis.password=${REDIS_PASSWORD:}

    # Source MySQL
    database.hostname=${MYSQL_HOST:127.0.0.1}
    database.port=${MYSQL_PORT:34306}
    database.user=${MYSQL_USER:canal}
    database.password=${MYSQL_PASSWORD:canal}
    database.server.id=85747

    # CDC scope
    database.include.list=mytest2
    table.include.list=mytest2.*
    snapshot.mode=schema_only

    # NOTE: snapshot.mode=schema_only means only the schema is captured on first
    # start — existing data in the source database is NOT replicated to the sink.
    # Use "initial" mode for full data sync on first deployment.
    #
    # IMPORTANT: Ensure MySQL binlog retention (expire_logs_days / binlog_expire_logs_seconds)
    # is longer than the maximum tolerable downtime. If the application is down longer than
    # the binlog retention period, CDC will fail permanently and require a full rebuild.
    topic.prefix=test

    # Features
    include.schema.changes=true
    include.query=true

    # Performance
    max.batch.size=2048
    max.queue.size=8192

logging:
  level:
    io:
      debezium: info
    root: info
